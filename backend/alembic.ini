[alembic]
script_location = alembic
prepend_sys_path = .

# NÃO trave URL aqui.
# O alembic/env.py deve ler DATABASE_URL do ambiente.
# Este valor aqui vira só fallback local (opcional).
sqlalchemy.url = sqlite:///./local.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s